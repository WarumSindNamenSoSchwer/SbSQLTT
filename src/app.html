<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<title>SbSQLTT</title>
		<script>
			// Apply theme before paint (no flash). Default: light. Override via toggle.
			try {
				const saved = localStorage.getItem('sbsqltt-theme');
				if (saved === 'dark') {
					document.documentElement.classList.remove('light');
				} else {
					document.documentElement.classList.add('light');
				}
			} catch {
				document.documentElement.classList.add('light');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="font-sans antialiased text-ink-900">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
